name: CI Pipeline

on:
  push:
    branches: ["features"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  id-token: write
  security-events: write
  actions: read # Requerido para telemetría de upload-sarif en el workflow hijo

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          DIRECT_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          GCP_PROJECT_ID: "dummy"
          NEXTAUTH_SECRET: "ci-dummy-secret-32-chars-minimum!!"
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    env:
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
      DIRECT_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
      GCP_PROJECT_ID: "dummy"
      NEXTAUTH_SECRET: "ci-dummy-secret-32-chars-minimum!!"
      NEXTAUTH_URL: "https://vaquiros.minube.dev"
      GOOGLE_CLIENT_ID: "dummy"
      GOOGLE_CLIENT_SECRET: "dummy"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build

  security:
    name: Security Scan
    # Corre en paralelo con test (ambos esperan lint)
    needs: [lint]
    uses: ./.github/workflows/security.yml
    secrets: inherit
