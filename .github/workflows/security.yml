name: Security Scan

on:
  workflow_call:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  scan:
    name: Security Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          format: "sarif"
          output: "trivy.sarif"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

      - name: Run Gitleaks (Docker direct to bypass bugs)
        run: |
          docker run -v ${GITHUB_WORKSPACE}:/path zricethezav/gitleaks:latest detect --source="/path" --format sarif --report-path="/path/gitleaks.sarif" --redact --continue
        continue-on-error: true

      - name: Upload Analysis Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "."
        continue-on-error: true # No fallar si el repo no tiene Code Scanning activado
